name: Publish MKDocs 
on:
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy MkDocs to GitHub Pages
        uses: mshams-IE/github-actions/actions/publish-mkdocs-action@main
        with:
          mkdocs_directory: 'instructor/mkdocs/'
          requirements_file: 'requirements.txt'
          python_version: 'python3'
          force_deploy: 'true'
